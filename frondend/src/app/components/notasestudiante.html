<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Asignatura — LEARNSCAPE</title>
    <link rel="stylesheet" href="../assets/styles/stylenotas.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="../assets/config.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Nunito', sans-serif; background: #f0f4ff; color: #1e293b; min-height: 100vh; }
        header {
            background: linear-gradient(135deg, #1a56db, #1040b0);
            color: white; padding: 18px 28px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 2px 12px rgba(26,86,219,0.25);
        }
        header h1 { font-size: 1.3rem; font-weight: 800; }
        .back-btn {
            background: rgba(255,255,255,0.15); border: none; color: white;
            padding: 8px 18px; border-radius: 8px; cursor: pointer;
            font-family: 'Nunito', sans-serif; font-size: 0.9rem; font-weight: 600;
            transition: background 0.2s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.28); }
        .container { max-width: 900px; margin: 30px auto; padding: 0 20px 40px; }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
        .info-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .info-card .label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: #64748b; font-weight: 700; margin-bottom: 6px; }
        .info-card .value { font-size: 1.1rem; font-weight: 800; color: #1e293b; }
        .prom-card { background: linear-gradient(135deg, #1a56db, #1040b0); color: white; }
        .prom-card .label { color: rgba(255,255,255,0.7); }
        .prom-card .value { font-size: 2rem; color: white; }
        .section-title { font-size: 1rem; font-weight: 800; color: #1040b0; margin: 28px 0 12px; display: flex; align-items: center; gap: 8px; }
        .grades-table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .grades-table thead { background: #1a56db; color: white; }
        .grades-table th { padding: 12px 16px; text-align: left; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .grades-table td { padding: 12px 16px; border-bottom: 1px solid #f1f5f9; font-size: 0.93rem; }
        .grades-table tbody tr:last-child td { border-bottom: none; }
        .grades-table tbody tr:hover { background: #f8faff; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.78rem; font-weight: 700; }
        .badge-superior { background: #dcfce7; color: #15803d; }
        .badge-alto     { background: #dbeafe; color: #1a56db; }
        .badge-basico   { background: #fef3c7; color: #d97706; }
        .badge-bajo     { background: #fee2e2; color: #e02222; }
        .asistencia-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
        .asist-card { background: white; border-radius: 12px; padding: 16px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .asist-card .num { font-size: 1.8rem; font-weight: 800; }
        .asist-card .lbl { font-size: 0.75rem; color: #64748b; font-weight: 600; margin-top: 4px; }
        .asist-card.presente .num { color: #15803d; }
        .asist-card.ausente  .num { color: #e02222; }
        .asist-card.tarde    .num { color: #d97706; }
        .asist-card.excusa   .num { color: #1a56db; }
        .empty { text-align: center; padding: 48px; color: #94a3b8; }
        .spinner { text-align: center; padding: 60px; font-size: 2rem; color: #1a56db; }
    </style>
</head>
<body>

<header>
    <h1 id="headerTitle">Detalle de Asignatura</h1>
    <button class="back-btn" onclick="window.history.back()">
        <i class="fas fa-arrow-left"></i> Volver
    </button>
</header>

<div class="container">
    <div id="loading" class="spinner"><i class="fas fa-spinner fa-spin"></i></div>
    <div id="content" style="display:none;">
        <div class="info-grid">
            <div class="info-card prom-card">
                <div class="label">Promedio</div>
                <div class="value" id="promedio">—</div>
            </div>
            <div class="info-card">
                <div class="label">Asignatura</div>
                <div class="value" id="asignaturaNombre">—</div>
            </div>
            <div class="info-card">
                <div class="label">Docente</div>
                <div class="value" id="docenteNombre">—</div>
            </div>
            <div class="info-card">
                <div class="label">Período</div>
                <div class="value" id="periodoLabel">—</div>
            </div>
        </div>

        <div class="section-title"><i class="fas fa-calendar-check"></i> Asistencia del período</div>
        <div class="asistencia-grid">
            <div class="asist-card presente"><div class="num" id="aPresentes">0</div><div class="lbl">Presentes</div></div>
            <div class="asist-card ausente"> <div class="num" id="aAusentes">0</div><div class="lbl">Ausentes</div></div>
            <div class="asist-card tarde">   <div class="num" id="aTardes">0</div>  <div class="lbl">Tardes</div></div>
            <div class="asist-card excusa">  <div class="num" id="aExcusas">0</div> <div class="lbl">Excusas</div></div>
        </div>

        <div id="cortesContainer"></div>
    </div>
    <div id="errorMsg" style="display:none;" class="empty">
        <i class="fas fa-exclamation-circle" style="font-size:2.5rem;margin-bottom:12px;color:#e02222;"></i>
        <p id="errorText">No se pudo cargar la información.</p>
    </div>
</div>

<script>
(async () => {
    const params   = new URLSearchParams(location.search);
    const asigId   = params.get('asignaturaId');
    const periodo  = params.get('periodo');
    const token    = localStorage.getItem('token');
    const username = localStorage.getItem('username');

    if (!asigId || !periodo || !token || !username) {
        showError('Faltan parámetros. Por favor regresa al panel del estudiante.');
        return;
    }

    async function gql(query, variables = {}) {
        const res = await fetch(window.LEARNSCAPE_API, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
            body: JSON.stringify({ query, variables })
        });
        const json = await res.json();
        if (json.errors) throw new Error(json.errors[0].message);
        return json.data;
    }

    function valBadge(n) {
        const num = Number(n);
        if (num >= 4.5) return '<span class="badge badge-superior">Superior</span>';
        if (num >= 4.0) return '<span class="badge badge-alto">Alto</span>';
        if (num >= 3.0) return '<span class="badge badge-basico">Básico</span>';
        return '<span class="badge badge-bajo">Bajo</span>';
    }

    try {
        const [asigData, calData, asistData] = await Promise.all([
            gql('query($id:ID!){ asignatura(id:$id){ nombre horario profesor{ nombre primerApellido } } }', { id: asigId }),
            gql('query($eid:ID!){ calificacionesPorEstudiante(estudianteId:$eid){ id nota periodo asignaturaId tipoActividad nombreActividad corte observaciones } }', { eid: username }),
            gql('query($eid:String!,$periodo:String){ resumenAsistenciaEstudiante(estudianteId:$eid,periodo:$periodo){ asignaturaId presentes ausentes tardes excusas } }', { eid: username, periodo })
        ]);

        const asig = asigData.asignatura;
        if (!asig) { showError('Asignatura no encontrada.'); return; }

        const cals = (calData.calificacionesPorEstudiante || [])
            .filter(c => String(c.asignaturaId) === String(asigId) && c.periodo === periodo);

        const promedio = cals.length
            ? (cals.reduce((s, c) => s + Number(c.nota), 0) / cals.length).toFixed(2) + ' / 5.0'
            : '—';

        const asistRow = (asistData.resumenAsistenciaEstudiante || [])
            .find(r => String(r.asignaturaId) === String(asigId));

        document.getElementById('headerTitle').textContent    = asig.nombre;
        document.getElementById('asignaturaNombre').textContent = asig.nombre;
        document.getElementById('docenteNombre').textContent  = asig.profesor
            ? asig.profesor.nombre + ' ' + asig.profesor.primerApellido : 'Sin docente';
        document.getElementById('periodoLabel').textContent   = periodo;
        document.getElementById('promedio').textContent       = promedio;

        document.getElementById('aPresentes').textContent = asistRow ? asistRow.presentes : 0;
        document.getElementById('aAusentes').textContent  = asistRow ? asistRow.ausentes  : 0;
        document.getElementById('aTardes').textContent    = asistRow ? asistRow.tardes    : 0;
        document.getElementById('aExcusas').textContent   = asistRow ? asistRow.excusas   : 0;

        const cortes = {};
        for (const c of cals) {
            const k = c.corte || 0;
            if (!cortes[k]) cortes[k] = [];
            cortes[k].push(c);
        }

        const corteNames = { 1: 'Primer Corte', 2: 'Segundo Corte', 3: 'Tercer Corte', 0: 'Sin corte asignado' };
        const container = document.getElementById('cortesContainer');

        const keys = Object.keys(cortes).sort();
        for (const k of keys) {
            const items = cortes[k];
            const promCorte = (items.reduce((s, c) => s + Number(c.nota), 0) / items.length).toFixed(2);
            const rows = items.map(c =>
                '<tr>' +
                '<td>' + (c.nombreActividad || '—') + '</td>' +
                '<td>' + (c.tipoActividad || '—') + '</td>' +
                '<td><strong>' + Number(c.nota).toFixed(1) + '</strong></td>' +
                '<td>' + valBadge(c.nota) + '</td>' +
                '<td>' + (c.observaciones || '') + '</td>' +
                '</tr>'
            ).join('');

            container.innerHTML +=
                '<div class="section-title">' +
                '<i class="fas fa-layer-group"></i>' +
                (corteNames[k] || 'Corte ' + k) +
                '<span style="margin-left:auto;font-size:0.85rem;color:#64748b;font-weight:600;">Promedio: ' + promCorte + '</span>' +
                '</div>' +
                '<table class="grades-table">' +
                '<thead><tr><th>Actividad</th><th>Tipo</th><th>Nota</th><th>Valoración</th><th>Observaciones</th></tr></thead>' +
                '<tbody>' + (rows || '<tr><td colspan="5" class="empty">Sin calificaciones</td></tr>') + '</tbody>' +
                '</table>';
        }

        if (!cals.length) {
            container.innerHTML = '<div class="empty"><i class="fas fa-inbox" style="font-size:2rem;margin-bottom:8px;display:block;"></i><p>No hay calificaciones registradas para este período.</p></div>';
        }

        document.getElementById('loading').style.display  = 'none';
        document.getElementById('content').style.display  = 'block';

    } catch (err) {
        showError('Error al cargar los datos: ' + err.message);
    }

    function showError(msg) {
        document.getElementById('loading').style.display  = 'none';
        document.getElementById('errorMsg').style.display = 'block';
        document.getElementById('errorText').textContent  = msg;
    }
})();
</script>
</body>
</html>
